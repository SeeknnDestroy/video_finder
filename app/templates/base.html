<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}YouTube Video Finder{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="page-bg"></div>
  <main class="layout">
    <header class="hero">
      <h1>YouTube Video Finder</h1>
      <p>Search watched videos from your Google Takeout history.</p>
    </header>

    {% if warnings %}
      <section class="message warning">
        <h2>Warnings</h2>
        <ul>
          {% for warning in warnings %}
            <li>{{ warning }}</li>
          {% endfor %}
        </ul>
      </section>
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
