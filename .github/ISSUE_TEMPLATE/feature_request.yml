name: Feature request
description: Propose a product or developer-experience improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or developer problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior, API, or workflow.
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints and tradeoffs
      description: Note any limits around performance, API quotas, privacy, or compatibility.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches were considered and why are they insufficient?
